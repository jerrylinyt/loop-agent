# loop.config.yaml — 專案設定區（階段②生成；放在 code repo 的 .loop/<workspace>/ 內）
# cascade：框架預設（engine/config.py 的 DEFAULTS）< 本檔。
# 本檔【只放「每專案必須自訂」的東西】：路徑、phases、模型、CLI 指令、mode。
# 其餘旋鈕（timeout / 震盪門檻 / 收斂門檻 / context 防爆…）一律走框架預設——
# 單一事實來源、改一處即可，避免「只改到一邊」的漂移。要覆寫某個進階旋鈕時，
# 才從文末「進階旋鈕」清單抄上來填值。
# ⚠️ 引擎從「code repo 根目錄」執行（產出落 repo 根；控制檔在 .loop/<workspace>/）。路徑皆相對 repo 根。
# {{LOOP_DIR}} 由 init-project.py 替換成 .loop/<workspace 名稱>（多份需求並存：見 README 多 workspace）。

framework_path: ~/.loop/framework            # 外部共享、唯讀的框架 clone（init 時填入實際路徑；每台機器不同）

control: {{LOOP_DIR}}/CONTROL.md
control_files: [{{LOOP_DIR}}/CONTROL.md, "{{LOOP_DIR}}/phases/*.md"]   # git 守護「整檔被清空」兜底對象（支援 glob）

# ── 生成階段：mode 是每專案決策；其餘收斂門檻走框架預設 ──
generation:
  mode: gated                                # gated（收斂後停下交人類 review）| auto（收斂後自動接執行迴圈）
  log_file: ./{{LOOP_DIR}}/plan.log          # per-workspace 路徑，必填

# ── 階段定義（每專案核心：幾個階段、叫什麼、產出去哪、收斂門檻）；is_done/PhaseGate 全依此 ──
# 最後一筆 = 最終階段。階段數由專案決定（不限 2）。output 相對 repo 根（程式碼落 src/，跨 workspace 共用；
# 分析文件落 {{LOOP_DIR}}/docs/，每個 workspace 各自獨立，避免多份需求互相覆蓋）。
# ⚠️ converge_threshold = 該階段每個任務的「單任務收斂門檻」，由生成 agent 依任務風險【逐階段自訂】，
#    不是固定值——請勿照抄範例數字（見 rules/convergence.md 三層收斂；典型 2~3、高風險更高；Init 類任務可省略此欄）。
phases:
  - { id: 1, name: <階段一名稱>, spec: {{LOOP_DIR}}/phases/PHASE1.md, output: {{LOOP_DIR}}/docs/, converge_threshold: "<逐階段自訂_見convergence.md>" }
  - { id: 2, name: <階段二名稱>, spec: {{LOOP_DIR}}/phases/PHASE2.md, output: src/, converge_threshold: "<逐階段自訂_見convergence.md>" }

# ── 進階收斂門檻（非每專案都有；大範圍防漏任務才加，見 rules/completeness.md。值由 agent 依任務自訂，勿照抄）──
extra_thresholds:
  page_converge: "<集合穩定收斂門檻_見completeness.md>"

# ── 執行階段：只需覆寫 per-workspace 路徑；timeout / 防爆等旋鈕走框架預設 ──
runtime:
  log_file: ./{{LOOP_DIR}}/loop.log
  state_dir: ./{{LOOP_DIR}}/.loop_state

# ── Agent 指令與模型（每專案 / 每 CLI 必填）──
agent:
  build_cmd: "opencode run -m {model} {prompt}"   # {model}/{prompt} 帶入；可加 {args} 佔位插入 extra_args
  extra_args: []                                  # 額外固定 CLI 參數（如 ["--yolo"]）；無 {args} 佔位則接在 prompt 前
  models:
    fast: "<你的極速模型>"                            # 樹模式葉子節點 / Git Review Gate 專用（例如 gemini-2.5-flash）
    normal: "<你的標準模型>"                          # 主要 Execute / Plan 引擎（例如 gemini-2.5-pro）
    thinking: "<你的思考模型>"                        # 卡關時自動切換的高階模型 / 拆解分析
  # prompts 省略 → 用框架 engine/prompts.yaml 預設。要客製單一 prompt 才取消註解覆寫：
  # prompts:
  #   base: |
  #     請讀取 {control}，依 .loop/rules/boot-sequence.md 的 BOOT SEQUENCE 工作…

# ═════════════════════════════════════════════════════════════════════════
# 進階旋鈕（預設不用寫；要覆寫框架預設時，才把對應段落取消註解填值）。
# 括號/數值即【框架預設值】，完整定義見框架 engine/config.py 的 DEFAULTS。
# ⚠️ 把某 key 寫在這裡 = 覆蓋框架預設；不寫 = 永遠跟著框架走（建議）。
