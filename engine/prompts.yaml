# ─────────────────────────────────────────────────────────────────────────
# Agent prompts（框架預設層 / cascade 最底層）
#
# 設計原則：prompt 只負責「本輪做什麼 + 讀哪份 rule + 產出/commit 機械步驟」。
# 所有方法論（怎麼收斂、何時歸零、何時停機、如何防漏）一律【不在 prompt 重寫】，
# 改為指向 .loop/rules/ 對應規則——rules 是唯一事實來源，改 rule 不必同步改 prompt。
#
# 佔位符（{control} {requirements} {diff_range} {control_files}
# {result_file} {node_id} {decomp_file} {max_files} {max_lines} …）由 config.fmt_prompt()
# 以 str.replace 代入；未代入的 {xxx} 會原樣留下，故只用引擎實際會帶入的 key。
#
# 專案可在 loop.config.yaml 用 agent.prompts.<key> 覆蓋單一 prompt（deep_merge）。
# ─────────────────────────────────────────────────────────────────────────

base: |
  請讀取狀態檔 {control}，依 .loop/rules/boot-sequence.md 的 BOOT SEQUENCE 開始工作（結束時做 STEP C 的提交）。
  🚨 嚴格遵守 boot-sequence 兩條鐵則：本輪只挑【單一一個】任務；STEP 10 完成 commit 後【立即停止輸出並結束 process】，絕不自行開下一輪。
  本輪必讀：{control} 與 .loop/rules/boot-sequence.md；其餘 rules 按需讀。
  🚨 狀態更新鐵則：狀態資料存於 {control}，你一律禁止直接碰觸或修改 {control} 檔案本身！
  在需要更新狀態或填寫 last_round_mode, last_round_result 等欄位時，請務必先閱讀並依循 .loop/rules/state-cli-guide.md 指引，呼叫系統提供的 `{state_cli}` 進行更新！
  ❌ 任何直接修改 {control} 檔案的行為，皆會被 Review Gate 判定為無效並 REVERT。



escalation: |
  前幾輪偵測到反覆修壞（A↔B 震盪 / 卡在驗證）。請先判斷根因再動手：
  (1) 實作疏漏（A、B 可同時滿足）→ 一次修對兩邊；
  (2) 規格矛盾（兩條規格本質衝突）→ 不要硬修，依 .loop/rules/oscillation-escalation.md 開 BLOCKING Issue 寫清楚衝突與出處，
      把涉及任務標 FROZEN，交人類裁決。判斷依據寫進 Issue/修正記錄。

git_review: |
  你正在執行 Loop Engineering 的【獨立 Git Review Gate】（全新 context，只審不寫 code）。
  目標：審查上一次的 Commit Diff 是否合理，並驗證狀態變更是否合規。

  必讀規則：.loop/rules/git-review-gate.md
  Diff 範圍：{diff_range}
  當前 Commit Diff 內容：
  {diff_content}

  當前最新狀態資料 (state.json)：
  {state_json_content}

  請依規則檔要求自行審查代碼與 state.json 變更，只把單一 JSON verdict object 覆寫到 `{result_file}`。格式為：
  {
    "verdict": "PASS",
    "checklist": [
      { "id": 1,  "name": "中斷與殘留防護",        "result": "PASS" },
      { "id": 2,  "name": "排版與狀態檔結構破壞",   "result": "PASS" },
      { "id": 3,  "name": "不合理狀態進展",         "result": "PASS" },
      { "id": 4,  "name": "中間區段被挖空",         "result": "PASS" },
      { "id": 5,  "name": "思考過程外洩",           "result": "PASS" },
      { "id": 6,  "name": "語意一致性",             "result": "PASS" },
      { "id": 7,  "name": "AI偷懶佔位符",           "result": "PASS" },
      { "id": 8,  "name": "無故刪檔與路徑幻覺",      "result": "PASS" },
      { "id": 9,  "name": "衝突標記與取代錯位",      "result": "PASS" },
      { "id": 10, "name": "基礎語法與格式全毀",      "result": "PASS" },
      { "id": 11, "name": "驗收證據缺失",           "result": "PASS" },
      { "id": 12, "name": "收斂計數防偽",           "result": "PASS" },
      { "id": 13, "name": "產出異動卻沒歸零收斂",    "result": "PASS" },
      { "id": 14, "name": "整合輪越界改葉子",        "result": "PASS" }
    ],
    "reason": ""
  }
  🚨 限制與規則：
  1. 輸出必須僅是一個 JSON 物件，不得夾雜任何散文或 HTML 標籤（如 ```json ``` 等包裝也請不要輸出，只寫純 JSON）。
  2. `verdict` 僅限三種值之一：`"PASS"`、`"REVERT"`、`"FATAL_STATE"`。
  3. `checklist` 必須精確包含以上 14 項紅線檢查。`result` 僅能是 `"PASS"` 或 `"FLAG"`。如果 `result` 是 `"FLAG"`，則該項物件中必須有 `"evidence"` 欄位以附上具體佐證（例如 檔名:行號 或衝突內容）；如果為 `"PASS"`，則不得有 `"evidence"` 或是將 `"evidence"` 留空。
  4. 當 `verdict` 是 `"REVERT"` 或 `"FATAL_STATE"` 時，`reason` 必填（人類可讀的原因）；為 `"PASS"` 時，`reason` 必為空字串。
  5. 寫完判決即停止輸出並結束，不執行 git commit，不修改任何其他檔案。

plan: |
  你正在執行 Loop Engineering【階段②：生成/精修規劃書】（生成輪）。
  讀 {requirements} + 框架 rules（.loop/rules/ 的 BLUEPRINT、context-budget、state-model、convergence、completeness）。
  依 .loop/generators/1-plan-generator.md：(重新)獨立推導並產出/精修 {control} 等規劃書（loop.config.yaml + state.json + phases/*.md）。
  🚨 收斂一律依 .loop/rules/convergence.md 協定執行（先不看舊版、從需求獨立重推 → 留下紀錄 → 僅在有實質差異時才改檔 → 一有實質差異即收斂歸零 → 有疑義從嚴算實質）。不要在此自訂收斂判準。
  在需要更新規劃書狀態或填寫 plan_changed_last 欄位時，請務必先閱讀並依循 .loop/rules/state-cli-guide.md 指引，呼叫系統提供的 `{state_cli}` 進行更新（例如設定 plan_changed_last 為 true/false）！
  寫檔只允許 .loop/，禁止寫框架。結束 git add -A && git commit。
  （Plan Gate 由獨立的審查輪負責，你這輪不需自審。）

plan_gate: |
  你正在執行 Loop Engineering【階段②的獨立 Plan Gate】（全新 context，只審不生）。
  讀 {requirements} + .loop/ 的 loop.config.yaml / state.json / phases/*.md + .loop/generators/2-plan-review-gate.md。
  逐項檢查 Gate（需求全覆蓋 / 任務粒度 / 無循環依賴 / 停止可判讀 / 收斂就位 / 逃生門 / context防爆 / 框架唯讀 / 引擎可讀 / 輪數估算）。
  ❗只審查、不要修改任何規劃書檔（read-only verify）。
  在需要更新審查狀態（例如填寫 plan_gate_last 為 PASS/FAIL）時，請務必先閱讀並依循 .loop/rules/state-cli-guide.md 指引，呼叫系統提供的 `{state_cli}` 進行更新！
  結束 git add -A && git commit。
